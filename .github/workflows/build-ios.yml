name: Build iOS

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/build-ios.yml'
      - 'ios/**'
      - 'examples/bare/ios/**'
      - 'examples/bare/Gemfile'
      - 'examples/bare/Gemfile.lock'
      - 'src/Spec/**'
      - '**/Podfile.lock'
      - '**/*.podspec'
      - '**/react-native.config.js'
      - 'package.json'
      - 'yarn.lock'
  pull_request:
    paths:
      - '.github/workflows/build-ios.yml'
      - 'ios/**'
      - 'examples/bare/ios/**'
      - 'examples/bare/Gemfile'
      - 'examples/bare/Gemfile.lock'
      - 'src/Spec/**'
      - '**/Podfile.lock'
      - '**/*.podspec'
      - '**/react-native.config.js'
      - 'package.json'
      - 'yarn.lock'

env:
  USE_CCACHE: 1
  RCT_NEW_ARCH_ENABLED: 1
  ARCH: arm64

jobs:
  build:
    name: Build iOS Example App
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn

      - name: Enable Corepack
        run: corepack enable

      - name: Install npm dependencies (yarn)
        run: yarn install --immutable

      - name: Restore ccache
        uses: hendrikmuhs/ccache-action@v1.2

      - name: Select Xcode 16.4
        run: sudo xcode-select -s "/Applications/Xcode_16.4.app/Contents/Developer"

      - name: Setup Ruby (bundle)
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.2
          bundler-cache: true
          working-directory: examples/bare

      - name: Restore Pods cache
        uses: actions/cache@v4
        with:
          path: examples/bare/ios/Pods
          key: ${{ runner.os }}-pods-${{ hashFiles('**/Podfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-pods-

      - name: Install Pods
        working-directory: examples/bare/ios
        run: bundle exec pod check || bundle exec pod install

      - name: Build App
        working-directory: examples/bare/ios
        run: "set -o pipefail && xcodebuild \
          CC=clang CPLUSPLUS=clang++ LD=clang LDPLUSPLUS=clang++ \
          -derivedDataPath build -UseModernBuildSystem=YES \
          -workspace BareExample.xcworkspace \
          -scheme BareExample \
          -sdk iphonesimulator \
          -configuration Debug \
          -destination 'generic/platform=iOS Simulator,arch=${{ env.ARCH }}' \
          build \
          CODE_SIGNING_ALLOWED=NO"
