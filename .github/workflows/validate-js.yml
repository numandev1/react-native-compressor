name: Validate JS

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/validate-js.yml'
      - 'src/**'
      - '*.json'
      - '*.js'
      - '*.lock'
      - 'examples/bare/src/**'
      - 'examples/bare/*.json'
      - 'examples/bare/*.js'
      - 'examples/bare/*.tsx'
      - 'examples/expo/app/**'
      - 'examples/expo/*.json'
      - 'examples/expo/*.js'
      - 'examples/expo/*.tsx'
  pull_request:
    paths:
      - '.github/workflows/validate-js.yml'
      - 'src/**'
      - '*.json'
      - '*.js'
      - '*.lock'
      - 'examples/bare/src/**'
      - 'examples/bare/*.json'
      - 'examples/bare/*.js'
      - 'examples/bare/*.tsx'
      - 'examples/expo/app/**'
      - 'examples/expo/*.json'
      - 'examples/expo/*.js'
      - 'examples/expo/*.tsx'

jobs:
  compile:
    name: Compile JS (tsc)
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install reviewdog
      uses: reviewdog/action-setup@v1

    - name: Install node_modules
      run: yarn install --immutable

    - name: Run TypeScript # Reviewdog tsc errorformat: %f:%l:%c - error TS%n: %m
      run: |
        yarn typecheck | reviewdog -name="tsc" -efm="%f(%l,%c): error TS%n: %m" -reporter="github-pr-review" -filter-mode="nofilter" -fail-on-error -tee
      env:
        REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  lint:
    name: Lint JS (eslint, prettier)
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install node_modules
      run: yarn install --immutable

    - name: Run ESLint
      run: yarn lint

    - name: Run ESLint with auto-fix
      run: yarn lint --fix

    - name: Verify no files have changed after auto-fix
      run: git diff --exit-code HEAD
